<body class='container'>

	<h1>A big list of spoonerisms</h1>

	<hr>

	<ol class="breadcrumb">
		<li class="breadcrumb-item"><a href="https://elasticfrog.github.io/">🐸 Elastic Frog</a></li>
		<li class="breadcrumb-item"><a href="https://github.com/elasticfrog/spoonerisms">Spoonerisms Repository</a></li>
		<li class="breadcrumb-item active">Spoonerisms</li>
	</ol>

	<hr>

	<table id='e' class='table table-striped table-hover table-sm table-bordered'>
		<thead>
			<tr>
				<th>#</th>
				<th>Phrase</th>
				<th>Spoonerism</th>
			</tr>
			<thead>
			<tbody id="content"></tbody>
	</table>

	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
	<script
		src="https://cdn.datatables.net/v/bs5/jszip-3.10.1/dt-2.3.7/b-3.2.6/b-colvis-3.2.6/b-html5-3.2.6/b-print-3.2.6/r-3.0.8/sc-2.4.3/datatables.min.js"
		integrity="sha384-OoYMCZKaW0oO3nMUw+xDFi3JwbUVIP1jfXU2AHvOETtPx1BreX3SP+mgYQ5SzLwd"
		crossorigin="anonymous"></script>
	<script src="spoonerisms.js"></script>

	<script>

		console.log(myData);

		var arrayLength = myData.length;
		let myOutput = "";
		for (var i = 0; i < arrayLength; i++) {
			let var_phrase = myData[i].phrase;
			let var_spoonerism = myData[i].spoonerism;
			myOutput += "<tr>";
			myOutput += "<td>"+(i+1)+"</td>";
			myOutput += "<td>"+var_phrase+"</td>";
			myOutput += "<td>"+var_spoonerism+"</td>";
			myOutput += "</tr>";
		}

		document.getElementById('content').innerHTML = myOutput;

		$(document).ready(function () {
			$('#e').dataTable({
				/* No ordering applied by DataTables during initialisation */
				"order": [],
				"paging": false,
				layout: {
					topStart: {
						buttons: ['copy', 'csv', 'excel', 'pdf', 'print']
					}
				}
			});
		})

	</script>

</body>
